<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moments | Sankarguru Vidyapeeth</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
  }

  header {
    padding: 30px;
    font-size: clamp(36px, 7vw, 64px);
    font-weight: bold;
    color: #00e1ff;
    text-shadow: 0 0 15px #00fbff, 0 0 30px #00aaff, 0 0 45px #0077ff;
    letter-spacing: 2px;
  }

  .container {
    max-width: 1000px;
    margin: 50px auto;
    padding: 0 20px;
  }

  .moment-box {
    background: rgba(0, 0, 0, 0.45);
    border: 4px solid #00eaff;
    border-radius: 12px;
    padding: 40px 20px;
    margin: 30px 0;
    font-size: 32px;
    font-weight: bold;
    cursor: pointer;

    /* Neon glow */
    box-shadow: 
      0 0 10px #00eaff,
      0 0 20px #00eaff,
      0 0 30px #00d1ff,
      0 0 40px #00c2ff;
    
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .moment-box:hover {
    transform: scale(1.05);
    box-shadow:
      0 0 15px #00eaff,
      0 0 30px #00eaff,
      0 0 45px #00cfff,
      0 0 60px #00bfff;
  }

  .box-title {
    margin: 0;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff, 0 0 12px #00bfff;
  }

  /* Fun background accent lines */
  .neon-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    background:
      radial-gradient(circle at 10% 20%, rgba(0,255,255,0.15), transparent),
      radial-gradient(circle at 85% 30%, rgba(255,0,255,0.15), transparent),
      radial-gradient(circle at 50% 85%, rgba(255,255,0,0.15), transparent);
  }

  @media (max-width: 768px) {
    .moment-box {
      font-size: 28px;
      padding: 30px 15px;
    }
  }
</style>
</head>
<body>

<div class="neon-bg"></div>

<header>MOMENTS</header>

<div class="container">

  <div class="moment-box" onclick="location.href='festivals.html'">
    <p class="box-title">1. FESTIVALS</p>
  </div>

  <div class="moment-box" onclick="location.href='functions.html'">
    <p class="box-title">2. FUNCTIONS</p>
  </div>

  <div class="moment-box" onclick="location.href='picnic.html'">
    <p class="box-title">3. PICNIC</p>
  </div>

</div>

</body>
</html>
